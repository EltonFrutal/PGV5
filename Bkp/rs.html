<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RS &mdash; PGV5</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#e2e8f0;color:#1e293b;font-family:'DM Sans',sans-serif;min-height:100vh;}
.hdr-main{background:#000;border-bottom:1px solid #1e293b;padding:0 28px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr-menu-btn{background:transparent;border:1.5px solid #334155;border-radius:8px;color:#94a3b8;
  padding:8px;cursor:pointer;text-decoration:none;transition:all .2s;display:flex;align-items:center;
  justify-content:center;width:38px;height:38px;}
.hdr-menu-btn:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.1);}
.hdr-menu-btn svg{display:block;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.hdr-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#fff;overflow:hidden;}
.btn-trocar-org{background:transparent;border:1.5px solid #334155;border-radius:8px;color:#94a3b8;
  padding:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;text-decoration:none;}
.btn-trocar-org:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.1);}
.btn-trocar-org svg{display:block;}
.btn-logoff{background:transparent;border:1.5px solid #334155;border-radius:7px;color:#94a3b8;
  font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;padding:8px 12px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;}
.btn-logoff:hover{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1);}
.btn-logoff svg{display:block;}
.hdr-sub{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 28px;height:50px;
  display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.subnav-btn{background:transparent;border:none;font-family:'DM Sans',sans-serif;font-size:.82rem;
  font-weight:600;color:#64748b;padding:6px 14px;border-radius:6px;cursor:pointer;text-decoration:none;transition:all .2s;}
.subnav-btn:hover{background:#f1f5f9;color:#1e293b;}
.subnav-btn.active{background:#6366f115;color:#6366f1;}
.sub-div{width:1px;height:20px;background:#e2e8f0;}
.filtro-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap;}
.filtro-label{font-size:.7rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;}
.filtro-select{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:7px;color:#334155;
  font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:5px 10px;outline:none;cursor:pointer;transition:border-color .2s;}
.filtro-select:focus{border-color:#6366f1;}
.filtro-nav-btn{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:6px;color:#475569;
  font-size:.78rem;font-weight:700;padding:5px 9px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.filtro-nav-btn:hover{border-color:#6366f1;color:#6366f1;background:#fff;}
main{padding:22px 28px 48px;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;}
.kpi-card{background:#fff;border:1px solid #e8ecf4;border-radius:14px;padding:10px 12px;
  position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:box-shadow .2s;}
.kpi-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.09);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,#6366f1);}
.kpi-titulo{font-size:.72rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.kpi-valor{font-size:1.9rem;font-weight:800;color:#0f172a;letter-spacing:-.04em;line-height:1;margin-bottom:6px;}
.kpi-var{font-size:.8rem;font-weight:700;}
.kpi-footer{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;
  border-top:1px solid #f1f5f9;font-size:.7rem;color:#94a3b8;font-weight:500;}
.prog-bar{height:4px;background:#f1f5f9;border-radius:3px;margin-top:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;}
.kpi-ph{background:#fff;border:2px dashed #e2e8f0;border-radius:14px;padding:18px 20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:120px;}
.kpi-ph .ph-t{font-size:.72rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.kpi-ph .ph-m{font-size:.7rem;color:#cbd5e1;line-height:1.6;}
.chart-row{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:16px;}
.chart-card{background:#fff;border:1px solid #e8ecf4;border-radius:14px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.chart-titulo{font-size:.9rem;font-weight:800;color:#0f172a;letter-spacing:-.02em;}
.chart-sub{font-size:.7rem;color:#94a3b8;font-weight:500;margin-top:3px;}
.chart-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.chart-leg{display:flex;gap:12px;flex-wrap:wrap;}
.leg-i{display:flex;align-items:center;gap:5px;font-size:.68rem;color:#64748b;font-weight:500;}
.leg-d{width:10px;height:10px;border-radius:2px;}
.chart-wrap{position:relative;height:220px;}
.kpi2-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi2-card{background:#fff;border:1px solid #e8ecf4;border-radius:14px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.kpi2-titulo{font-size:.7rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;}
.kpi2-vals{display:flex;align-items:flex-end;gap:14px;margin-bottom:6px;}
.kpi2-v{font-size:1.7rem;font-weight:800;letter-spacing:-.04em;}
.kpi2-v.sec{font-size:1.3rem;color:#94a3b8;}
.kpi2-vr{font-size:1rem;font-weight:800;}
.kpi2-labs{display:flex;gap:14px;font-size:.65rem;color:#94a3b8;font-weight:500;}
.kpi2-ph{background:#fff;border:2px dashed #e2e8f0;border-radius:14px;padding:18px 20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kpi-card,.kpi2-card,.chart-card,.kpi-ph,.kpi2-ph{animation:fadeUp .4s ease both;}
@media(max-width:900px){
  .kpi-row,.kpi2-row{grid-template-columns:repeat(2,1fr);}
  .chart-row{grid-template-columns:1fr;}
  main{padding:16px;}
  .hdr-main,.hdr-sub{padding:0 16px;}
}

body{display:block;}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-top:32px;}
.mod-card{background:#fff;border:1px solid #e8ecf4;border-radius:16px;padding:32px 24px;
  text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.05);text-decoration:none;display:block;}
.mod-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,.12);border-color:#6366f1;}
.mod-card.inativo{opacity:0.4;cursor:not-allowed;}
.mod-card.inativo:hover{transform:none;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.mod-icon{width:64px;height:64px;margin:0 auto 20px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;background:#6366f115;}
.mod-icon i{color:#6366f1;}
.mod-titulo{font-size:1.1rem;font-weight:800;color:#0f172a;letter-spacing:-.02em;text-transform:uppercase;}
.mod-badge{position:absolute;top:12px;right:12px;background:#f1f5f9;color:#94a3b8;
  font-size:.65rem;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.mod-card{animation:fadeIn .5s ease both;}
.mod-card:nth-child(1){animation-delay:0s;}
.mod-card:nth-child(2){animation-delay:.05s;}
.mod-card:nth-child(3){animation-delay:.1s;}
.mod-card:nth-child(4){animation-delay:.15s;}
.mod-card:nth-child(5){animation-delay:.2s;}
.mod-card:nth-child(6){animation-delay:.25s;}
.mod-card:nth-child(7){animation-delay:.3s;}
@media(max-width:900px){
  .mod-grid{grid-template-columns:repeat(2,1fr);gap:14px;}
}
</style>
</head>
<body>
<header class="hdr-main"><div style="display:flex;align-items:center;gap:16px;"><a href="index.html" class="hdr-menu-btn" title="Menu" style="opacity:0.3;pointer-events:none;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></a><img src="imagem/logos/sistema.png" alt="PGV5" style="height:34px" onerror="this.style.display='none'"><span style="color:#fff;font-weight:700;font-size:1.1rem;letter-spacing:-.02em">Painel Gerencial</span></div><div class="hdr-right"><img src="imagem/logos/rs.png" style="height:32px;margin-right:8px" onerror="this.style.display='none'"><div class="hdr-avatar" id="hdr-avatar">?</div><a href="index.html" class="btn-trocar-org" title="Trocar Organização"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a><button class="btn-logoff" id="btn-logout"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg><span style="margin-left:6px">Sair</span></button></div></header><script>(function(){var s=sessionStorage.getItem("pgv5");if(!s){window.location="index.html";return;}var u=JSON.parse(s);var avatar=document.getElementById("hdr-avatar");if(u.foto){avatar.innerHTML='<img src="'+u.foto+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';}else{avatar.textContent=u.nome.charAt(0).toUpperCase();}document.getElementById("btn-logout").addEventListener("click",function(){sessionStorage.removeItem("pgv5");window.location="index.html";});})();</script>
<main style="max-width:1000px;margin:0 auto;">
<h1 style="font-size:1.8rem;font-weight:900;color:#0f172a;letter-spacing:-.03em;margin-bottom:8px;">RS</h1>
<p style="font-size:.85rem;color:#64748b;font-weight:500;">Selecione um módulo para começar</p>
<div class="mod-grid" id="mod-grid"></div>
</main>
<script>
var MODULOS = [{"id": "vendas", "label": "Vendas", "desc": "Faturamento, pedidos e vendedores", "cor": "#6366f1", "pronto": true}, {"id": "compras", "label": "Compras", "desc": "Entradas e fornecedores", "cor": "#10b981", "pronto": false}, {"id": "a_receber", "label": "A Receber", "desc": "Títulos e inadimplência", "cor": "#f59e0b", "pronto": false}, {"id": "a_pagar", "label": "A Pagar", "desc": "Obrigações e vencimentos", "cor": "#ef4444", "pronto": false}, {"id": "historicos", "label": "Históricos", "desc": "Movimentos por período", "cor": "#8b5cf6", "pronto": false}, {"id": "indicadores", "label": "Indicadores", "desc": "KPIs e metas", "cor": "#06b6d4", "pronto": false}, {"id": "resultados", "label": "Resultados", "desc": "DRE e resultado final", "cor": "#f97316", "pronto": false}];
var dashUrl = 'rs_vendas_dash.html';

// Mapeamento de ícones Lucide por módulo
var iconMap = {
  'Vendas': 'trending-up',
  'Compras': 'shopping-cart',
  'A Receber': 'arrow-down-to-line',
  'A Pagar': 'arrow-up-from-line',
  'Históricos': 'history',
  'Indicadores': 'gauge',
  'Resultados': 'pie-chart'
};

document.getElementById('mod-grid').innerHTML = MODULOS.map(function(m){
  var ativo = m.label === 'Vendas';
  var url = ativo ? dashUrl : '#';
  var icon = iconMap[m.label] || 'box';
  
  return '<a href="'+url+'" class="mod-card'+(ativo?'':' inativo')+'" '+(ativo?'':'onclick="return false;"')+'>'+
    (ativo?'':'<span class="mod-badge">Em breve</span>')+
    '<div class="mod-icon"><i data-lucide="'+icon+'" style="width:48px;height:48px"></i></div>'+
    '<div class="mod-titulo">'+m.label+'</div>'+
    '</a>';
}).join('');

lucide.createIcons();
</script>
</body></html>
